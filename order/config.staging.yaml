grpc:
  host: "0.0.0.0"
  port: "50051"

http:
  host: "0.0.0.0"
  port: "8080"
  read_header_timeout: "5s"
  read_timeout: "15s"
  write_timeout: "15s"
  idle_timeout: "60s"
  shutdown_timeout: "10s"

pg:
  host: "postgres-staging"
  port: "5432"
  database: "ufo_staging"
  user: "ufo_admin"
  password: "staging_secret"
  sslmode: "require"

inventory:
  host: "inventory-staging"
  port: "50051"
  ping_interval: "10s"
  ping_timeout: "10s"

payment:
  host: "payment-staging"
  port: "50052"
  ping_interval: "10s"
  ping_timeout: "10s"
