syntax = "proto3";

package inventory.v1;

// TODO: Заменить на актуальный go_package
option go_package = "github.com/student/shared/pkg/proto/inventory/v1;inventoryv1";

import "google/protobuf/timestamp.proto";

// InventoryService управляет каталогом деталей для космических кораблей
service InventoryService {
  // GetPart возвращает деталь по UUID
  rpc GetPart(GetPartRequest) returns (GetPartResponse);

  // ListParts возвращает список деталей с опциональной фильтрацией
  rpc ListParts(ListPartsRequest) returns (ListPartsResponse);

  // ValidateCompatibility проверяет совместимость деталей между собой
  rpc ValidateCompatibility(ValidateCompatibilityRequest) returns (ValidateCompatibilityResponse);

  // ReserveParts резервирует детали для заказа
  rpc ReserveParts(ReservePartsRequest) returns (ReservePartsResponse);

  // ReleaseParts освобождает ранее зарезервированные детали
  rpc ReleaseParts(ReleasePartsRequest) returns (ReleasePartsResponse);
}

// Тип детали
enum PartType {
  // Не указан
  PART_TYPE_UNSPECIFIED = 0;
  // Корпус
  PART_TYPE_HULL = 1;
  // Двигатель
  PART_TYPE_ENGINE = 2;
  // Щит
  PART_TYPE_SHIELD = 3;
  // Оружие
  PART_TYPE_WEAPON = 4;
}

// Part представляет деталь космического корабля
message Part {
  // Уникальный идентификатор детали
  string uuid = 1;

  // Название детали
  string name = 2;

  // Описание детали
  string description = 3;

  // Цена в копейках (5000₽ = 500000)
  int64 price = 4;

  // Тип детали
  PartType part_type = 5;

  // Количество на складе
  int64 stock_quantity = 6;

  // Дата создания
  google.protobuf.Timestamp created_at = 7;
}

// Запрос на получение детали по UUID
message GetPartRequest {
  // UUID детали
  string uuid = 1;
}

// Ответ с деталью
message GetPartResponse {
  // Найденная деталь
  Part part = 1;
}

// Запрос на получение списка деталей
message ListPartsRequest {
  // Фильтр по типу детали
  PartType part_type = 1;

  // Фильтр по UUID
  repeated string uuids = 2;
}

// Ответ со списком деталей
message ListPartsResponse {
  // Список деталей
  repeated Part parts = 1;
}

// Запрос на проверку совместимости деталей
message ValidateCompatibilityRequest {
  // UUID деталей для проверки
  repeated string uuids = 1;
}

// Ответ на проверку совместимости (пустой — значит совместимы)
message ValidateCompatibilityResponse {}

// Запрос на резервирование деталей
message ReservePartsRequest {
  // UUID деталей для резервирования
  repeated string uuids = 1;
}

// Ответ на резервирование (пустой — значит успешно)
message ReservePartsResponse {}

// Запрос на освобождение ранее зарезервированных деталей
message ReleasePartsRequest {
  // UUID деталей для освобождения
  repeated string uuids = 1;
}

// Ответ на освобождение (пустой — значит успешно)
message ReleasePartsResponse {}
