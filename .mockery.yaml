# Конфигурация mockery v3.
# Документация: https://vektra.github.io/mockery/latest/configuration/

# Шаблон testify с expecter API.
template: testify

# Форматирование сгенерированного кода.
formatter: goimports

# Директория для сгенерированных моков (рядом с интерфейсом в подпапке mocks).
dir: "{{.InterfaceDir}}/mocks"

# Имя файла мока (snake_case через функцию snakecase).
filename: "mock_{{ .InterfaceName | snakecase }}.go"

# Имя пакета моков.
pkgname: "mocks"

# Имя структуры мока (совпадает с именем интерфейса).
structname: "{{.InterfaceName}}"

# Принудительная перезапись существующих файлов.
force-file-write: true

# Boilerplate текст (лицензия, заголовок).
template-data:
  boilerplate-file: ".mockery_boilerplate_text.txt"

packages:


  # Order service
  github.com/PabloGolobaro/cosmic_factory/order/internal/api/order/v1:
    config:
      include-interface-regex: ".*Service"
  github.com/PabloGolobaro/cosmic_factory/order/internal/service/order:
    config:
      include-interface-regex: ".*(Repository|Client|Producer)"

  # Inventory service
  github.com/PabloGolobaro/cosmic_factory/inventory/internal/api/part/v1:
    config:
      include-interface-regex: ".*Service"
  github.com/PabloGolobaro/cosmic_factory/inventory/internal/service/application/part:
    config:
      include-interface-regex: ".*(Repository|CompatibilityChecker)"

  # Order Kafka consumers & producers
  github.com/PabloGolobaro/cosmic_factory/order/internal/consumer/assembly_consumer:
    config:
      include-interface-regex: ".*Consumer"
  github.com/PabloGolobaro/cosmic_factory/order/internal/consumer/order:
    config:
      include-interface-regex: ".*Consumer"
  github.com/PabloGolobaro/cosmic_factory/order/internal/producer/order_producer:
    config:
      include-interface-regex: ".*Producer"

  # Assembly service
  github.com/PabloGolobaro/cosmic_factory/assembly/internal/service/assembly:
    config:
      include-interface-regex: ".*Producer"

  # Payment service
  github.com/PabloGolobaro/cosmic_factory/payment/internal/api/payment/v1:
    config:
      include-interface-regex: ".*Service"
